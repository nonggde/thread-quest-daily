<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="splash.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Thread Quest Daily</title>
  </head>
  <body>
    <main class="quest-card">
      <div class="brand-row">
        <img class="signal-mark" src="/assets/signal-mark.svg" alt="" />
        <div>
          <p class="kicker">TODAY'S COMMUNITY EXPEDITION</p>
          <h1>Thread Quest</h1>
        </div>
      </div>
      <div class="route-preview" aria-hidden="true">
        <span class="node start"></span><span class="line one"></span><span class="node relay"></span>
        <span class="line two"></span><span class="node beacon"></span><span class="line three"></span>
        <span class="node gate"></span>
      </div>
      <p class="mission">Light two beacons. Reach the north gate. Add your best route to the thread.</p>
      <div class="stats" aria-live="polite">
        <div><strong id="community-score">--</strong><span>COMMUNITY SIGNAL</span></div>
        <div><strong id="run-count">--</strong><span>EXPLORERS</span></div>
        <div><strong>75s</strong><span>DAILY RUN</span></div>
      </div>
      <button id="start-button" type="button">ENTER TODAY'S MAP</button>
      <p class="player" id="player-name"></p>
    </main>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
